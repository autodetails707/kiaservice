<!DOCTYPE html>
<html lang="hy">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kia Service Armenia</title>
  <style>
    :root {
      --text: #ffffff;
      --muted: #e6e6e6;
      --accent: #d91f26;
      --shadow: rgba(0, 0, 0, 0.55);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background: #000;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      background:
        linear-gradient(to top, rgba(0, 0, 0, 0.72), rgba(0, 0, 0, 0.2)),
        url('https://www.kia.com/content/dam/kia2/in/en/images/one-kia/homepage/kv_01_pc.jpg') center/cover no-repeat;
    }

    .content {
      width: min(980px, 100%);
      text-align: center;
      text-shadow: 0 4px 18px var(--shadow);
    }

    h1 {
      margin: 0;
      font-size: clamp(36px, 7vw, 74px);
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 800;
    }

    p {
      margin: 14px auto 0;
      font-size: clamp(17px, 2.2vw, 24px);
      color: var(--muted);
      max-width: 760px;
    }

    .actions {
      margin-top: 30px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      padding: 12px 22px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 15px;
      transition: transform 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-outline {
      border: 1px solid rgba(255, 255, 255, 0.8);
      color: #fff;
      background: rgba(0, 0, 0, 0.25);
    }

    @media (max-width: 600px) {
      .hero {
        background-position: 60% center;
      }
    }
  </style>
</head>
<body>
  <main class="hero" aria-label="Kia մեծ նկար">
    <div class="content">
      <h1>KIA SERVICE ARMENIA</h1>
      <p>kia.am ոճով պարզ և գեղեցիկ էջ՝ մեկ մեծ Kia նկարով և հստակ կոնտակտով։</p>
      <div class="actions">
        <a class="btn btn-primary" href="tel:+37493777740">📞 Զանգահարել հիմա</a>
        <a class="btn btn-outline" href="https://kia.am" target="_blank" rel="noopener noreferrer">Տեսնել kia.am</a>
      </div>
    </div>
  </main>
</body>
</html>
